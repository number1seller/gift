
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Account Data</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace; /* Более готический шрифт */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .outer-frame {
            border: 4px solid #ffffff;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            background-color: #050505;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            position: relative;
        }

        h1 {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 35px;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .content-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        /* SVG-иконки кос */
        .scythe-icon {
            width: 80px;
            height: 100px;
            fill: #ffffff;
            flex-shrink: 0;
        }

        .table-wrapper {
            flex-grow: 1;
            max-width: 320px;
            border: 2px solid #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #000000;
        }

        td {
            padding: 15px;
            border: 1px solid #ffffff;
            font-size: 16px;
            text-align: left;
        }

        td.label {
            color: #aaaaaa;
            width: 40%;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }

        td.value {
            color: #ffffff;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
        }

        .footer-text {
            font-size: 14px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="outer-frame">
        <h1>STEAM ACCOUNT</h1>
        
        <div class="content-wrapper">
            <!-- Левая коса Смерти (смотрит вправо) -->
            <svg class="scythe-icon" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <path d="M 10,10 L 90,110 L 80,100 L 10,20 Z" /> <!-- Древко -->
                <path d="M 10,10 C 20,5 50,0 80,10 C 60,20 40,30 20,40 Z" /> <!-- Лезвие -->
            </svg>
            
            <div class="table-wrapper">
                <table>
                    <tr>
                        <td class="label">Login</td>
                        <td class="value">wsw6200</td>
                    </tr>
                    <tr>
                        <td class="label">Pass</td>
                        <td class="value">QAZqaz6200</td>
                    </tr>
                </table>
            </div>
            
            <!-- Правая коса Смерти (смотрит влево, отзеркалена) -->
            <svg class="scythe-icon" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" style="transform: scaleX(-1);">
                <path d="M 10,10 L 90,110 L 80,100 L 10,20 Z" />
                <path d="M 10,10 C 20,5 50,0 80,10 C 60,20 40,30 20,40 Z" />
            </svg>
        </div>

        <div class="footer-text">NUMBER1SELLERCHATGPT</div>
    </div>

</body>
</html>
