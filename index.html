<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            border: 2px solid #ffffff;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            background-color: #050505;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .data-layout {
            display: table;
            width: 100%;
            margin-bottom: 25px;
        }

        .scythe-col {
            display: table-cell;
            vertical-align: middle;
            width: 40px;
            font-size: 20px;
            font-weight: bold;
            color: #aaaaaa;
        }

        .table-container {
            display: table-cell;
            vertical-align: middle;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #000000;
        }

        td {
            padding: 12px 15px;
            border: 1px solid #333333;
            font-size: 15px;
            text-align: left;
        }

        td.label {
            color: #888888;
            width: 35%;
            font-weight: 500;
        }

        td.value {
            color: #ffffff;
            font-family: monospace;
            font-size: 16px;
        }

        .footer-text {
            font-size: 12px;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Данные аккаунта</h1>
        
        <div class="data-layout">
            <div class="scythe-col">///</div>
            
            <div class="table-container">
                <table>
                    <tr>
                        <td class="label">Логин</td>
                        <td class="value">wsw6200</td>
                    </tr>
                    <tr>
                        <td class="label">Пароль</td>
                        <td class="value">QAZqaz6200</td>
                    </tr>
                </table>
            </div>
            
            <div class="scythe-col">\\\</div>
        </div>

        <div class="footer-text">number 1 seller</div>
    </div>

</body>
</html>
